<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LLM Pricing</title>
  <link
    rel="icon"
    type="image/svg+xml"
    href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAzMiAzMiI+PGNpcmNsZSBjeD0iMTYiIGN5PSIxNiIgcj0iMTUiIGZpbGw9IiMyNTYzZWIiLz48cGF0aCBmaWxsPSIjZmZmIiBkPSJtMTYgNyAyIDcgNyAyLTcgMi0yIDctMi03LTctMiA3LTJaIi8+PC9zdmc+" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" crossorigin="anonymous">
  <style>
    :root {
      --navbar-height: 3.5rem;
    }

    body {
      padding-top: var(--navbar-height);
    }

    #llm-cost > svg {
      width: 100%;
      height: auto;
    }

    /* Sticky chart area during scrollytelling */
    #chart-sticky {
      position: sticky;
      top: calc(var(--navbar-height) + 0.75rem);
      z-index: 40;
      background: var(--bs-body-bg);
      padding-bottom: 0.25rem;
    }

    /* Overlay container (kept for structure, no longer hosts cards) */
    #chart-area {
      position: relative;
    }

    /* Scrolly step — full-height trigger containing the sticky card */
    .scrolly-step {
      height: 85vh;
      position: relative;
    }

    /* Gap between steps so the chart is visible between cards */
    .scrolly-gap {
      height: 40vh;
    }

    /* Glassmorphism scrolly card — sticky within its step */
    .scrolly-card {
      position: sticky;
      z-index: 50;
      top: calc(var(--navbar-height) + 0.75rem + 45vh);  /* lower half of chart */
      max-width: 360px;
      width: 38%;
      min-width: 240px;
      padding: 1.1rem 1.35rem 0.9rem;
      border-radius: 14px;
      backdrop-filter: blur(14px) saturate(1.6);
      -webkit-backdrop-filter: blur(14px) saturate(1.6);
      background: rgba(255, 255, 255, 0.18);
      border: 1px solid rgba(255, 255, 255, 0.35);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.12), 0 1px 2px rgba(255, 255, 255, 0.3) inset;
      font-size: 0.8rem;
      line-height: 1.55;
      opacity: 0;
      transform: translateY(12px);
      transition: opacity 0.45s ease, transform 0.45s ease;
      /* left by default */
      margin-right: auto;
    }

    .scrolly-card.vert-top {
      top: calc(var(--navbar-height) + 0.75rem + 4rem);  /* upper quarter of chart */
    }

    .scrolly-card.pos-right {
      margin-left: auto;
      margin-right: 0;
    }

    .scrolly-card.pos-center {
      margin-left: auto;
      margin-right: auto;
    }

    [data-bs-theme="dark"] .scrolly-card {
      background: rgba(18, 18, 32, 0.72);
      border-color: rgba(255, 255, 255, 0.13);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5), 0 1px 0px rgba(255, 255, 255, 0.06) inset;
    }

    .scrolly-card.is-active {
      opacity: 1;
      transform: translateY(0);
    }

    .scrolly-card h6 {
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      margin-bottom: 0.5rem;
      opacity: 0.75;
    }

    .scrolly-card p {
      margin-bottom: 0.55rem;
    }

    .scrolly-card p:last-child {
      margin-bottom: 0;
    }

    .scrolly-card .card-links {
      margin-top: 0.6rem;
      display: flex;
      flex-wrap: wrap;
      gap: 0.35rem;
    }

    .scrolly-card .card-links a {
      font-size: 0.72rem;
      opacity: 0.8;
      text-decoration: underline;
      text-underline-offset: 2px;
    }
  </style>
</head>

<body>

  <nav class="navbar navbar-expand-lg bg-body-tertiary fixed-top" data-bs-theme="dark">
    <div class="container-fluid">
      <a class="navbar-brand" href=".">LLM Pricing</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarSupportedContent">
        <div class="nav-item dropdown ms-auto" role="group" aria-label="Toggle dark mode" title="Toggle Dark Mode">
          <div class="ms-auto">
            <div class="bootstrap-dark-theme"></div>
          </div>
        </div>
      </div>
    </div>
  </nav>

  <div class="container">
    <h1 class="display-1 my-4 text-center">LLM Pricing</h1>
    <h2 class="display-6 text-center">Which LLMs are the best value for money?</h2>
    <div id="README" class="my-5 mx-auto" style="max-width: 30rem"></div>
    <div id="chart-sticky">
      <div id="provider-filter" class="d-flex flex-wrap align-items-center gap-1 mt-4" aria-label="Filter by provider"></div>
      <div class="row align-items-center mt-2">
        <div class="col-lg-4 col-xl-3 d-flex">
          <div class="dropdown mb-3">
            <button class="btn btn-outline-secondary dropdown-toggle" type="button" id="quality" data-bs-toggle="dropdown" aria-expanded="false">
              Overall
            </button>
            <ul class="dropdown-menu">
              <li><a href="?quality=overall" class="dropdown-item">Overall</a></li>
              <li><a href="?quality=coding" class="dropdown-item">Coding</a></li>
              <li><a href="?quality=hard" class="dropdown-item">Hard</a></li>
            </ul>
          </div>
          <input id="model" class="form-control mb-3 ms-2" placeholder="Filter models">
        </div>
        <div class="col-lg-8 col-xl-9 d-flex">
          <label class="form-label text-nowrap me-3" id="date-label" for="date">Month</label>
          <input type="range" id="date" class="form-range mb-3 flex-grow-1" min="0" max="100" step="1" value="100">
        </div>
      </div>
      <div class="row align-items-center mt-1 mb-2">
        <div class="col-12 d-flex flex-wrap align-items-center gap-2">
          <span class="text-nowrap small text-secondary me-1">Show:</span>
          <div class="btn-group btn-group-sm" role="group" aria-label="Toggle model categories">
            <input type="checkbox" class="btn-check" id="show-best" autocomplete="off" checked>
            <label class="btn btn-outline-success" for="show-best">🟢 Best</label>
            <input type="checkbox" class="btn-check" id="show-worst" autocomplete="off" checked>
            <label class="btn btn-outline-danger" for="show-worst">🔴 Worst</label>
            <input type="checkbox" class="btn-check" id="show-others" autocomplete="off" checked>
            <label class="btn btn-outline-secondary" for="show-others">⚪ Others</label>
          </div>
          <div class="btn-group btn-group-sm ms-auto" role="group" aria-label="Zoom controls">
            <button type="button" id="zoom-select" class="btn btn-outline-primary">🔍 Select &amp; zoom</button>
            <button type="button" id="zoom-reset" class="btn btn-outline-secondary" disabled>Reset zoom</button>
          </div>
        </div>
      </div>
      <div id="chart-area">
        <div id="llm-cost" class="img-fluid"></div>
        <!-- Scrolly card overlay injected by JS -->
      </div>
    </div>

    <!-- Scrolly step triggers — generated by script.js -->
    <div id="scrolly-section"></div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" type="module"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap-dark-theme@1.2/dist/dark-theme.js" type="module"></script>
  <script src="script.js" type="module"></script>
</body>

</html>
